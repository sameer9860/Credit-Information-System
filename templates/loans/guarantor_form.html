{% extends "base.html" %}
{% block content %}

<style>
    .form-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background: #f9f9f9;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    form {
        display: flex;
        flex-direction: column;
    }

    form p {
        margin-bottom: 15px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
        color: #444;
    }

    input,
    select,
    textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
    }

    input:focus,
    select:focus,
    textarea:focus {
        border-color: #007bff;
        outline: none;
        box-shadow: 0 0 4px rgba(0, 123, 255, 0.3);
    }

    button {
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background-color: #0056b3;
    }

    .errorlist {
        color: red;
        margin-bottom: 10px;
        list-style: none;
        padding: 0;
    }
</style>

<div class="form-container">
    <h2>{% if form.instance.pk %}Edit{% else %}Add{% endif %} Guarantor</h2>
    <p class="text-muted"><small>Select a member to auto-fill name, citizenship number, and contact number.</small></p>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">💾 Save Guarantor</button>
    </form>
</div>

</form>
</div>

{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function () {
        // Initialize Select2 on the member select field
        $('#id_member').select2({
            placeholder: 'Search and select a member...',
            allowClear: true,
            theme: 'bootstrap-5',
            width: '100%'
        });

        // Auto-fill guarantor fields when a member is selected
        $('#id_member').on('change', function () {
            const memberId = $(this).val();

            if (!memberId) {
                $('#id_name').val('');
                $('#id_citizenship_number').val('');
                $('#id_contact_number').val('');
                return;
            }

            fetch(`/loans/api/member/${memberId}/`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        $('#id_name').val(data.full_name);
                        $('#id_citizenship_number').val(data.citizenship_number);
                        $('#id_contact_number').val(data.phone);
                    }
                })
                .catch(err => console.error('Error fetching member details:', err));
        });
    });
</script>
{% endblock %}
